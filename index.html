async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": API_KEY,
      "anthropic-version":"2023-06-01"
    },
    body:JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:4000, messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  return (data.content?.find(b=>b.type==="text")?.text || "");
}

async function downloadPptx(pitchData, answers, lang) {
  const { default: JSZip } = await import("https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js");
  const org = pitchData.org || answers.name || "Organisation";
  const slides = pitchData.slides || [];
  const coverXml = makeCoverXml(org, pitchData.tagline||"", lang);
  const slideXmls = [coverXml, ...slides.slice(1).map((s,i)=>makeSlideXml(s,i+1,slides.length,org))];
  const listItems = slides.map((_,i)=>`<p:sldId id="${256+i}" r:id="rId${i+1}"/>`).join("");
  const rels = slides.map((_,i)=>`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide${i+1}.xml"/>`).join("");
  const ctypes = slides.map((_,i)=>`<Override PartName="/ppt/slides/slide${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`).join("");
  const zip = new JSZip();
  zip.file("[Content_Types].xml",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/>${ctypes}<Override PartName="/ppt/slideMasters/slideMaster1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideMaster+xml"/><Override PartName="/ppt/slideLayouts/slideLayout1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideLayout+xml"/></Types>`);
  zip.file("_rels/.rels",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/></Relationships>`);
  zip.file("ppt/presentation.xml",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:sldMasterIdLst><p:sldMasterId id="2147483648" r:id="rId1"/></p:sldMasterIdLst><p:sldIdLst>${listItems}</p:sldIdLst><p:sldSz cx="9144000" cy="6858000" type="screen4x3"/><p:notesSz cx="6858000" cy="9144000"/></p:presentation>`);
  zip.file("ppt/_rels/presentation.xml.rels",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="slideMasters/slideMaster1.xml"/>${rels}</Relationships>`);
  zip.file("ppt/slideMasters/slideMaster1.xml",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sldMaster xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="9144000" cy="6858000"/><a:chOff x="0" y="0"/><a:chExt cx="9144000" cy="6858000"/></a:xfrm></p:grpSpPr></p:spTree></p:cSld><p:sldLayoutIdLst><p:sldLayoutId id="2147483649" r:id="rId1"/></p:sldLayoutIdLst></p:sldMaster>`);
  zip.file("ppt/slideMasters/_rels/slideMaster1.xml.rels",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/></Relationships>`);
  zip.file("ppt/slideLayouts/slideLayout1.xml",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sldLayout xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="9144000" cy="6858000"/><a:chOff x="0" y="0"/><a:chExt cx="9144000" cy="6858000"/></a:xfrm></p:grpSpPr></p:spTree></p:cSld></p:sldLayout>`);
  zip.file("ppt/slideLayouts/_rels/slideLayout1.xml.rels",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="../slideMasters/slideMaster1.xml"/></Relationships>`);
  slideXmls.forEach((xml,i)=>zip.file(`ppt/slides/slide${i+1}.xml`,xml));
  slides.forEach((_,i)=>zip.file(`ppt/slides/_rels/slide${i+1}.xml.rels`,`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/></Relationships>`));
  const blob = await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.presentationml.presentation"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`Pitch_${org.replace(/\s+/g,"_")}.pptx`; a.click();
  URL.revokeObjectURL(url);
}

function App() {
  const [lang, setLang] = useState(null);
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [current, setCurrent] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [feedbackOk, setFeedbackOk] = useState(false);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const [pitchData, setPitchData] = useState(null);
  const [genLoading, setGenLoading] = useState(false);
  const [error, setError] = useState(null);

  const t = T[lang||"fr"];
  const questions = t.questions;

  async function validate() {
    if (!current.trim() || current.trim().length < 8) {
      setFeedback(lang==="fr"?"Votre réponse est trop courte. Pouvez-vous développer davantage ?":"Your answer is too short. Could you elaborate?");
      setFeedbackOk(false); return;
    }
    setLoading(true); setFeedback(null);
    const q = questions[step];
    const prompt = lang==="fr"
      ? `Expert pitch ONG. Question: "${q.label}". Réponse: "${current}". Suffisamment précis pour convaincre un bailleur ? JSON uniquement, sans markdown: {"ok":true,"feedback":"2 phrases max fr"}`
      : `NGO pitch expert. Question: "${q.label}". Answer: "${current}". Precise enough to convince a funder? JSON only, no markdown: {"ok":true,"feedback":"max 2 sentences en"}`;
    try {
      const raw = await callClaude(prompt);
      const p = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setFeedback(p.feedback); setFeedbackOk(p.ok);
      if(p.ok) setAnswers(prev=>({...prev,[q.id]:current}));
    } catch {
      setFeedbackOk(true);
      setAnswers(prev=>({...prev,[questions[step].id]:current}));
      setFeedback(null);
    }
    setLoading(false);
  }

  function next() {
    if(step+1<questions.length){setStep(s=>s+1);setCurrent("");setFeedback(null);setFeedbackOk(false);}
    else setDone(true);
  }

  function prev() {
    setStep(s=>s-1);
    setCurrent(answers[questions[step-1].id]||"");
    setFeedback(null); setFeedbackOk(false);
  }

  async function generate() {
    setGenLoading(true); setError(null);
    const prompt = lang==="fr"
      ? `Expert fundraising ONG. Génère un pitch deck puissant en français pour bailleurs. Infos: ${JSON.stringify(answers)}. Réponds UNIQUEMENT en JSON valide sans markdown: {"org":"","tagline":"accroche percutante","slides":[{"title":"","type":"cover","content":"texte détaillé","keyPoints":["","",""],"stat":{"value":"chiffre","label":"contexte"}}]}. Exactement 10 slides: cover, problem, solution, impact, model, team, ask, vision, differentiator, closing.`
      : `NGO fundraising expert. Generate a powerful English pitch deck for funders. Info: ${JSON.stringify(answers)}. Reply ONLY in valid JSON without markdown: {"org":"","tagline":"punchy tagline","slides":[{"title":"","type":"cover","content":"detailed text","keyPoints":["","",""],"stat":{"value":"figure","label":"context"}}]}. Exactly 10 slides: cover, problem, solution, impact, model, team, ask, vision, differentiator, closing.`;
    try {
      const raw = await callClaude(prompt);
      setPitchData(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) {
      setError(lang==="fr"?"Erreur lors de la génération. Vérifiez votre connexion et réessayez.":"Generation error. Check your connection and try again.");
    }
    setGenLoading(false);
  }

  function reset() { setLang(null);setStep(0);setAnswers({});setCurrent("");setFeedback(null);setFeedbackOk(false);setDone(false);setPitchData(null);setError(null); }

  const S = { maxWidth:"600px", margin:"0 auto", padding:"2rem 1.25rem" };
  const card = { background:"#fff", border:"1px solid #e5e5e3", borderRadius:"12px", padding:"1.5rem", marginBottom:"1rem" };
  const btnP = { padding:"10px 20px", fontSize:"14px", fontWeight:"500", border:"none", borderRadius:"8px", background:ACCENT, color:"#fff", cursor:"pointer", width:"100%" };
  const btnS = { ...btnP, background:"#f1f0ed", color:"#333", border:"1px solid #ddd" };

  if(!lang) return (
    <div style={S}>
      <div style={{...card,textAlign:"center",padding:"2.5rem 1.5rem"}}>
        <div style={{width:"52px",height:"52px",borderRadius:"50%",background:ACCENT_LIGHT,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 1.25rem"}}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke={ACCENT} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <p style={{fontSize:"22px",fontWeight:"600",marginBottom:"6px"}}>Pitch Builder</p>
        <p style={{fontSize:"14px",color:"#777",marginBottom:"1.75rem"}}>ONG & Entreprise Sociale</p>
        <div style={{display:"flex",gap:"12px"}}>
          <button style={{...btnP,flex:1}} onClick={()=>setLang("fr")}>Français</button>
          <button style={{...btnP,flex:1,background:"#2980B9"}} onClick={()=>setLang("en")}>English</button>
        </div>
      </div>
    </div>
  );

  if(pitchData) return (
    <div style={S}>
      <div style={{...card,borderLeft:`4px solid ${ACCENT}`}}>
        <p style={{fontWeight:"600",color:ACCENT,marginBottom:"4px",fontSize:"15px"}}>{lang==="fr"?"Pitch généré avec succès !":"Pitch successfully generated!"}</p>
        <p style={{fontSize:"13px",color:"#666"}}>{pitchData.org} — {pitchData.tagline}</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:"8px",marginBottom:"1rem"}}>
        {(pitchData.slides||[]).map((sl,i)=>(
          <div key={i} style={{background:"#f8f8f6",borderRadius:"8px",padding:"12px"}}>
            <p style={{fontSize:"11px",color:"#aaa",margin:"0 0 4px",textTransform:"uppercase"}}>Slide {i+1}</p>
            <p style={{fontSize:"13px",fontWeight:"500",margin:"0 0 4px",color:"#111"}}>{sl.title}</p>
            {sl.stat?.value && <span style={{fontSize:"12px",fontWeight:"600",color:ACCENT_DARK,background:ACCENT_LIGHT,padding:"2px 8px",borderRadius:"4px",display:"inline-block"}}>{sl.stat.value}</span>}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:"10px"}}>
        <button style={{...btnP,flex:2}} onClick={()=>downloadPptx(pitchData,answers,lang)}>{t.download}</button>
        <button style={{...btnS,flex:1}} onClick={reset}>{t.restart}</button>
      </div>
    </div>
  );

  if(done) return (
    <div style={S}>
      <div style={{...card,textAlign:"center",padding:"2rem"}}>
        <div style={{width:"48px",height:"48px",borderRadius:"50%",background:ACCENT_LIGHT,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 1rem"}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke={ACCENT} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <p style={{fontSize:"17px",fontWeight:"600",marginBottom:"8px"}}>{t.done_title}</p>
        <p style={{fontSize:"13px",color:"#777",marginBottom:"1.5rem"}}>{Object.keys(answers).length} {t.done_sub}</p>
        {error && <p style={{color:"#c0392b",fontSize:"13px",marginBottom:"1rem",padding:"10px",background:"#fef0ee",borderRadius:"6px"}}>{error}</p>}
        <button style={btnP} onClick={generate} disabled={genLoading}>{genLoading?t.gen_loading:t.gen_pitch}</button>
      </div>
    </div>
  );

  const q = questions[step];
  const pct = Math.round((step/questions.length)*100);

  return (
    <div style={S}>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"1.25rem"}}>
        <div style={{flex:1,height:"5px",background:"#eee",borderRadius:"3px",overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",background:ACCENT,borderRadius:"3px",transition:"width .35s"}}/>
        </div>
        <span style={{fontSize:"12px",color:"#999",whiteSpace:"nowrap"}}>{t.step} {step+1} {t.of} {questions.length}</span>
      </div>
      <div style={card}>
        <p style={{fontSize:"16px",fontWeight:"600",marginBottom:"8px",color:"#111"}}>{q.label}</p>
        <p style={{fontSize:"12px",color:"#777",marginBottom:"1rem",padding:"9px 12px",background:"#f8f8f6",borderRadius:"6px",lineHeight:"1.6"}}>{q.tip}</p>
        {q.long
          ? <textarea rows={4} placeholder={q.placeholder} value={current} onChange={e=>{setCurrent(e.target.value);setFeedback(null);setFeedbackOk(false);}}/>
          : <input type="text" placeholder={q.placeholder} value={current} onChange={e=>{setCurrent(e.target.value);setFeedback(null);setFeedbackOk(false);}}/>
        }
        {feedback && (
          <div style={{marginTop:"10px",padding:"10px 14px",borderRadius:"8px",background:feedbackOk?ACCENT_LIGHT:"#fef9ee",border:`1px solid ${feedbackOk?ACCENT:"#f0c040"}`}}>
            <p style={{fontSize:"13px",margin:0,color:feedbackOk?ACCENT_DARK:"#7a5c00",lineHeight:"1.6"}}>{feedback}</p>
          </div>
        )}
        <div style={{marginTop:"1rem",display:"flex",gap:"10px"}}>
          {feedbackOk
            ? <button style={btnP} onClick={next}>{lang==="fr"?"Continuer →":"Continue →"}</button>
            : <button style={btnP} onClick={validate} disabled={loading}>{loading?t.generating:t.next}</button>
          }
          {step>0 && <button style={{...btnS,width:"auto",padding:"10px 16px"}} onClick={prev}>←</button>}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
